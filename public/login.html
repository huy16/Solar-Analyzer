<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAS Thermal - Login</title>
    <link rel="icon" type="image/png" href="assets/cas_full_logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #000;
            overflow: hidden;
            position: relative;
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.7)),
                url('assets/login_bg.jpg') center/cover no-repeat;
            animation: kenBurns 25s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes kenBurns {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .login-container {
            width: 100%;
            max-width: 380px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header Area */
        .logo-area {
            text-align: center;
            margin-bottom: 18px;
        }

        .logo-img {
            height: 42px;
            margin-bottom: -5px;
        }

        .brand-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 2px;
            background: linear-gradient(
                to right,
                #ffffff 0%,
                #f59e0b 25%,
                #ffffff 50%,
                #f59e0b 75%,
                #ffffff 100%
            );
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: textFlow 4s linear infinite;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(245, 158, 11, 0.2);
        }

        @keyframes textFlow {
            to { background-position: -200% center; }
        }

        .brand-subtitle {
            font-size: 0.8rem;
            font-weight: 500;
            color: #a1a1aa;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* Login Card */
        .login-card {
            width: 100%;
            background: rgba(15, 23, 42, 0.65);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 22px 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
            border-color: rgba(255,255,255,0.2);
        }

        .input-group {
            margin-bottom: 14px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper svg {
            position: absolute;
            left: 14px;
            color: #94a3b8;
            width: 18px;
            height: 18px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 10px 15px 10px 42px;
            border-radius: 10px;
            border: 2px solid transparent;
            background: #f1f5f9;
            color: #0f172a;
            font-size: 0.88rem;
            font-weight: 500;
            outline: none;
            transition: all 0.2s;
        }

        .input-wrapper input:focus {
            border-color: #ea580c;
            background: #ffffff;
            box-shadow: 0 0 15px rgba(234, 88, 12, 0.3);
            transform: scale(1.01);
        }

        .input-wrapper input::placeholder {
            color: #64748b;
        }

        .login-btn {
            background: #ea580c;
            color: #ffffff;
            padding: 12px;
            border-radius: 10px;
            border: none;
            width: 100%;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 6px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .login-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 25%;
            height: 200%;
            background: rgba(255, 255, 255, 0.4);
            transform: rotate(30deg);
            animation: shimmer 4s infinite;
        }

        @keyframes shimmer {
            0% { left: -60%; }
            15% { left: 140%; }
            100% { left: 140%; }
        }

        .login-btn:hover {
            background: #c2410c;
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(234, 88, 12, 0.4);
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .login-error {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 15px;
            text-align: center;
            font-weight: 500;
            display: none;
        }

        /* Footer */
        .footer-text {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.72rem;
            color: rgba(255, 255, 255, 0.6);
            white-space: nowrap;
            font-weight: 500;
            letter-spacing: 0.5px;
            z-index: 20;
        }

    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="login-container">
        <div class="logo-area">
            <img src="assets/Logo_CAS_White.png" alt="CAS Logo" class="logo-img">
            <h1 class="brand-title">SOLAR REPORT</h1>
            <p class="brand-subtitle">Operations & Maintenance System</p>
        </div>

        <div class="login-card">
            <div class="input-group">
                <label>Email</label>
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                    <input type="email" id="email" placeholder="engineer@cas.vn" value="engineer@cas.vn" onkeypress="if(event.key === 'Enter') checkLogin()">
                </div>
            </div>

            <div class="input-group">
                <label>Mật khẩu</label>
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <input type="password" id="password" placeholder="••••••••" onkeypress="if(event.key === 'Enter') checkLogin()">
                </div>
            </div>
            
            <button class="login-btn" onclick="checkLogin()" id="loginBtn">Đăng nhập</button>
            <div class="login-error" id="errorMsg">Email hoặc mật khẩu không đúng.</div>
        </div>
    </div>

    <div class="footer-text">
        © 2026 CAS Energy Solutions • Solar Report v1.0
    </div>

    <script>
        // Check if already logged in
        if (sessionStorage.getItem('cas_auth_token')) {
            window.location.href = '/index.html';
        }

        async function checkLogin() {
            const email = document.getElementById('email').value;
            const pwd = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errorMsg');
            
            btn.disabled = true;
            btn.innerText = 'Đang xử lý...';
            err.style.display = 'none';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: pwd })
                });

                const data = await response.json();
                
                if (data.success) {
                    sessionStorage.setItem('cas_auth_token', data.token);
                    window.location.href = '/index.html';
                } else {
                    err.innerText = data.message || "Email hoặc Mật khẩu không đúng.";
                    err.style.display = 'block';
                }
            } catch (error) {
                err.innerText = "Lỗi kết nối máy chủ!";
                err.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.innerText = 'Đăng nhập';
            }
        }
    </script>
</body>
</html>
